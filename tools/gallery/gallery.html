<!doctype html>
<html>
	<body style="background-color: #181616; color: #c5c9c5; margin: 4rem; font-family: 'Liberation Sans', sans-serif">
		<div id="gallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(12rem, 1fr)); gap: 1rem"></div>

		<div
			id="toast"
			style="
				text-align: center;
				max-width: 30vw;
				position: fixed;
				bottom: -5rem;
				left: 50%;
				transform: translateX(-50%);
				background: #181616;
				color: #c5c9c5;
				padding: 1rem 2rem;
				border-radius: 0.5rem;
				transition: bottom 0.5s;
				pointer-events: none;
				display: flex;
				flex-direction: column;
				gap: 0.25rem;
				zoom: 130%;
				border: 0.5rem solid #333333;
			"
		>
			<div style="font-weight: bold; font-size: 0.8rem; margin-bottom: -0.2rem">COPIED TO CLIPBOARD</div>
			<div id="toast-path" style="font-size: 0.8rem; opacity: 0.8"></div>
		</div>

		<script>
			const THUMBNAILS_AMOUNT = 2319;
			const gallery = document.getElementById('gallery');
			const toast = document.getElementById('toast');
			const toastPath = document.getElementById('toast-path');
			let toastTimeout;

			const observer = new IntersectionObserver(
				(entries, observer) => {
					entries.forEach((entry) => {
						if (entry.isIntersecting) {
							const thumbnail = entry.target;
							thumbnail.src = thumbnail.dataset.src;
							observer.unobserve(thumbnail);
						}
					});
				},
				{
					rootMargin: '100% 0% 100% 0%',
				},
			);

			function showToast(text) {
				clearTimeout(toastTimeout);
				toastPath.textContent = text;
				toast.style.bottom = '1rem';
				toastTimeout = setTimeout(() => {
					toast.style.bottom = '-5rem';
				}, 3000);
			}

			for (let i = 1; i <= THUMBNAILS_AMOUNT; i++) {
				const num = i.toString().padStart(4, '0');
				const filename = num + '.jpg';
				const filepath = 'thumbnails/' + filename;

				const div = document.createElement('div');
				div.style.display = 'flex';
				div.style.flexDirection = 'column';
				div.style.cursor = 'pointer';

				const img = document.createElement('img');
				img.dataset.src = filepath;
				img.style.width = '100%';
				img.style.aspectRatio = '16 / 9';
				img.style.background = '#222222';

				observer.observe(img);

				div.addEventListener('click', async () => {
					await navigator.clipboard.writeText(filename);
					showToast(filename);
				});

				const span = document.createElement('div');
				span.style.fontSize = '0.8rem';
				span.style.textAlign = 'center';
				span.textContent = filename;

				div.appendChild(img);
				div.appendChild(span);
				gallery.appendChild(div);
			}
		</script>
	</body>
</html>
